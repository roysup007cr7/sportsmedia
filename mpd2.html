  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      font-family:'Rajdhani',system-ui,sans-serif;
    }

    /* Dashboard Layout Container */
    .dashboard-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top,#ff3b3b20 0%,transparent 50%), #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1;
    }

    /* Watch Button styling to cleanly bypass cross-origin platform policies */
    .watch-card {
      background: rgba(20, 20, 20, 0.75);
      border: 1px solid rgba(255, 60, 60, 0.25);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .watch-title {
      color: #fff;
      font-size: 24px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .watch-subtitle {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .action-stream-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #ff4444, #d80000);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      border-radius: 8px;
      letter-spacing: 1px;
      box-shadow: 0 8px 20px rgba(255,0,0,0.3);
      transition: .25s ease;
    }

    .action-stream-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(255,0,0,0.45);
    }

    /* Floating Join Button */
    .st-join-btn{
      position:absolute;
      top:10px;
      left:10px;
      z-index:100;
      min-width:110px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      text-decoration:none;
      background:rgba(255,255,255,0.1);
      color:#fff;
      font-size:13px;
      font-weight:700;
      letter-spacing:1px;
      border:1px solid rgba(255,255,255,.18);
      transition:.25s;
    }

    .st-join-btn:hover{
      background: rgba(255,255,255,0.2);
    }

    @media(max-width:600px){
      .st-join-btn{
        top:6px;
        left:6px;
        min-width:96px;
        height:30px;
        font-size:12px;
      }
    }

        WATCH LIVE STREAM
