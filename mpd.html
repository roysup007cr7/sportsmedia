<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SPORTS MEDIA</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8ZLQNMS4R2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-8ZLQNMS4R2');
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      font-family:'Rajdhani',system-ui,sans-serif;
    }

    /* Full-screen video container */
    .video-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content:center;
      z-index: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Floating Join Button */
    .st-join-btn{
      position:absolute;
      top:10px;
      left:10px;
      z-index:100;
      min-width:110px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      text-decoration:none;
      background:linear-gradient(135deg,#ff4444,#d80000);
      color:#fff;
      font-size:13px;
      font-weight:700;
      letter-spacing:1px;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:
          0 8px 25px rgba(255,0,0,.35),
          inset 0 1px 0 rgba(255,255,255,.25);
      transition:.25s;
    }

    .st-join-btn:hover{
      transform:translateY(-2px);
      box-shadow:
          0 14px 35px rgba(255,0,0,.45),
          inset 0 1px 0 rgba(255,255,255,.3);
    }

    @media(max-width:600px){
      .st-join-btn{
        top:6px;
        left:6px;
        min-width:96px;
        height:30px;
        font-size:12px;
      }
    }
  </style>
</head>

<body>

  <a href="https://chat.whatsapp.com/DYqeiR11qha8byg0TB3jix?s=cl&p=a&ilr=2" target="_blank" class="st-join-btn">
    Follow Us
  </a>

  <div class="video-container">
    <iframe 
      src="https://krxplor.github.io/mpd/mpd1.html" 
      allowfullscreen="true" 
      webkitallowfullscreen="true" 
      mozallowfullscreen="true"
      scrolling="no">
    </iframe>
  </div>

</body>
</html>
